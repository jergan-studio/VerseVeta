<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verseveta</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
}

/* toolbar */
#toolbar{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    background:white;
    padding:8px;
    border-radius:8px;
}

button{
    margin:3px;
}

/* CHIP MENU */
#chipMenu {
    position: absolute;
    background: white;
    border: 1px solid #333;
    padding: 5px;
    z-index: 9999;
    border-radius: 6px;
}

#chipMenu button {
    display: block;
    width: 140px;
    margin: 3px 0;
}

/* hidden utility */
.hidden {
    display: none;
}

/* editor */
#chipEditor {
    position: absolute;
    right: 10px;
    bottom: 10px;
    width: 250px;
    height: 150px;
    z-index: 9999;
}
</style>

</head>

<body>

<div id="toolbar">
    <button onclick="spawnBox()">Box</button>
    <button onclick="spawnCircle()">Circle</button>
    <button onclick="spawnVerity()">Verity</button>

    <button onclick="spawnVelocityChip()">Velocity Chip</button>
    <button onclick="spawnJVSChip()">JVS Chip</button>

    <button onclick="giveGun()">Gun</button>
    <button onclick="explode()">Explosion</button>
</div>

<!-- CHIP MENU -->
<div id="chipMenu" class="hidden">
    <button onclick="debugChip()">Debug Code</button>
    <button onclick="editChip()">Edit Code</button>
    <button onclick="deleteChip()">Delete Chip</button>
</div>

<!-- CHIP EDITOR -->
<textarea id="chipEditor" class="hidden"></textarea>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script src="game.js"></script>

</body>
</html>
