<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verseveta</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
}

/* toolbar */
#toolbar{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    background:white;
    padding:8px;
    border-radius:8px;
}

button{
    margin:3px;
}

/* chip menu */
#chipMenu {
    position:absolute;
    background:white;
    border:1px solid #333;
    padding:6px;
    border-radius:6px;
    z-index:9999;
}

#chipMenu button{
    display:block;
    width:140px;
    margin:3px 0;
}

.hidden{
    display:none;
}

/* editor */
#chipEditor{
    position:absolute;
    right:10px;
    bottom:10px;
    width:260px;
    height:150px;
    z-index:9999;
}
</style>

</head>

<body>

<div id="toolbar">
    <button onclick="spawnBox()">Box</button>
    <button onclick="spawnCircle()">Circle</button>
    <button onclick="spawnVerity()">Verity</button>

    <button onclick="spawnVelocityChip()">Velocity Chip</button>
    <button onclick="spawnJVSChip()">JVS Chip</button>

    <button onclick="giveGun()">Gun</button>
    <button onclick="explode()">Explosion</button>

    <button onclick="runChip()">Run Chip</button>
</div>

<!-- CHIP MENU -->
<div id="chipMenu" class="hidden">
    <button onclick="debugChip()">Debug</button>
    <button onclick="editChip()">Edit</button>
    <button onclick="deleteChip()">Delete</button>
</div>

<!-- CHIP EDITOR -->
<textarea id="chipEditor" class="hidden"></textarea>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script src="game.js"></script>

</body>
</html>
